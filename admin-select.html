<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chagua Mtoa Huduma - Airtel Congo</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #FF0000 0%, #FF3333 100%);
            padding: 40px 20px;
            font-family: 'Inter', sans-serif;
            margin: 0;
        }
        .container { max-width: 800px; margin: 0 auto; }
        .page-header { text-align: center; color: white; margin-bottom: 40px; }
        .page-header h1 { font-size: 32px; margin: 0 0 10px; }
        .page-header p  { font-size: 18px; opacity: 0.9; margin: 0; }
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }
        .admin-card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .admin-card:hover { transform: translateY(-5px); box-shadow: 0 8px 30px rgba(0,0,0,0.15); }
        .card-header { display: flex; align-items: center; margin-bottom: 16px; }
        .avatar {
            width: 60px; height: 60px; border-radius: 50%;
            background: linear-gradient(135deg, #FF0000, #FF3333);
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; color: white; font-weight: 700; margin-right: 15px;
            flex-shrink: 0;
        }
        .admin-name  { font-size: 20px; font-weight: 700; color: #1a202c; margin: 0 0 4px; }
        .admin-email { font-size: 14px; color: #718096; margin: 0; }
        .status-badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            background: #d4edda;
            color: #155724;
            margin-top: 10px;
        }
        .loading {
            text-align: center;
            color: white;
            padding: 60px 20px;
        }
        .spinner {
            border: 4px solid rgba(255,255,255,0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 40px; height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { 0%{transform:rotate(0deg)} 100%{transform:rotate(360deg)} }
        .empty {
            background: white;
            border-radius: 16px;
            padding: 40px;
            text-align: center;
        }
        .empty-icon { font-size: 48px; margin-bottom: 20px; }
        .empty h3   { font-size: 22px; color: #1a202c; margin: 0 0 10px; }
        .empty p    { color: #718096; margin: 0; }
    </style>
</head>
<body>
    <div class="container">
        <div class="page-header">
            <h1>💰 Chagua Mtoa Huduma Wako</h1>
            <p>Chagua wakala utakayefanya kazi naye kwa ombi lako la mkopo</p>
        </div>

        <div id="loadingState" class="loading">
            <div class="spinner"></div>
            <p>Inapakia watoa huduma wanaopatikana...</p>
        </div>

        <div id="adminCards" class="cards-grid" style="display:none;"></div>

        <div id="noAdmins" class="empty" style="display:none;">
            <div class="empty-icon">🚫</div>
            <h3>Hakuna Watoa Huduma Wanaopatikana</h3>
            <p>Tafadhali rudi baadaye au wasiliana na msaada.</p>
        </div>
    </div>

    <script>
    (function() {
        // ============================================
        // If admin ID already in URL (query or hash), skip selection
        // ============================================
        function getAdminIdFromUrl() {
            // Hash format: /#a/ADMINID
            const hashMatch = window.location.hash.match(/^#a\/([A-Za-z0-9_-]+)/);
            if (hashMatch) return hashMatch[1];
            // Query param: ?admin=ADMINID
            return new URLSearchParams(window.location.search).get('admin');
        }

        const existingAdminId = getAdminIdFromUrl();
        if (existingAdminId) {
            // Already have an admin — clear session and redirect with ID in URL
            sessionStorage.removeItem('selectedAdminId');
            sessionStorage.removeItem('applicationData');
            sessionStorage.setItem('selectedAdminId', existingAdminId);
            window.location.replace('index.html?admin=' + encodeURIComponent(existingAdminId));
            return; // stop execution
        }

        // ============================================
        // No admin in URL — load selection list
        // ============================================
        loadAdmins();

        async function loadAdmins() {
            try {
                const res  = await fetch('/api/admins');
                const data = await res.json();

                document.getElementById('loadingState').style.display = 'none';

                if (data.success && data.admins && data.admins.length > 0) {
                    renderAdmins(data.admins.filter(a => a.status === 'active'));
                } else {
                    document.getElementById('noAdmins').style.display = 'block';
                }
            } catch (err) {
                console.error('Error loading admins:', err);
                document.getElementById('loadingState').style.display = 'none';
                document.getElementById('noAdmins').style.display = 'block';
            }
        }

        function renderAdmins(admins) {
            if (admins.length === 0) {
                document.getElementById('noAdmins').style.display = 'block';
                return;
            }

            const grid = document.getElementById('adminCards');
            grid.style.display = 'grid';

            admins.forEach(admin => {
                const initials = admin.name.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);
                const card = document.createElement('div');
                card.className = 'admin-card';
                card.innerHTML = `
                    <div class="card-header">
                        <div class="avatar">${initials}</div>
                        <div>
                            <p class="admin-name">${escapeHtml(admin.name)}</p>
                            <p class="admin-email">${escapeHtml(admin.email)}</p>
                        </div>
                    </div>
                    <span class="status-badge">✓ Inafanya Kazi</span>
                `;
                card.addEventListener('click', () => selectAdmin(admin.id));
                grid.appendChild(card);
            });
        }

        function selectAdmin(adminId) {
            // Wipe any old session data and set fresh admin ID
            sessionStorage.removeItem('selectedAdminId');
            sessionStorage.removeItem('applicationData');
            sessionStorage.setItem('selectedAdminId', adminId);

            // Show brief loading message
            document.body.innerHTML = `
                <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;color:white;font-family:Inter,sans-serif;">
                    <div class="spinner" style="border:4px solid rgba(255,255,255,0.3);border-top:4px solid white;border-radius:50%;width:40px;height:40px;animation:spin 1s linear infinite;margin-bottom:20px;"></div>
                    <p style="font-size:18px;">Inaelekeza...</p>
                </div>
                <style>@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}</style>
            `;

            // Navigate to landing page WITH admin ID in URL
            setTimeout(() => {
                window.location.href = 'index.html?admin=' + encodeURIComponent(adminId);
            }, 400);
        }

        function escapeHtml(str) {
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }
    })();
    </script>
</body>
</html>
